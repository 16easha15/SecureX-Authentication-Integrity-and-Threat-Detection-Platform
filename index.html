<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SecureX - Authentication</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

    <div class="auth-wrapper">
        <div class="card auth-card">
            <h2 id="title">Register</h2>
            <p class="subtitle">SecureX: Authentication, Integrity and Threat Detection Platform</p>

            <div class="input-group">
                <input type="text" id="username" placeholder="Enter Username" />
            </div>

            <div class="input-group password-wrapper">
                <input type="password" id="password" placeholder="Enter Password" oninput="analyzePassword()" />
                <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePassword()">👁️</button>
            </div>

            <div class="input-group">
                <select id="role">
                    <option value="">Select Role</option>
                    <option value="Admin">Admin</option>
                    <option value="User">User</option>
                </select>
            </div>

            <div class="score-box">
                <label>Security Score</label>
                <div class="progress-bar">
                    <div id="scoreFill"></div>
                </div>
                <small id="scoreText">Empty</small>
            </div>

            <button id="mainBtn" onclick="registerUser()">Register</button>

            <p class="switch-text">
                Already have an account?
                <span onclick="switchToLogin()">Login</span>
            </p>

            <div id="mfaSection" class="hidden">
                <div class="input-group">
                    <input type="text" id="mfaCode" placeholder="Enter MFA Code" />
                </div>
                <button onclick="verifyMFA()">Verify MFA</button>
            </div>

            <div id="hashBox" class="hash-box hidden">
                <strong>SHA-256 Password Hash:</strong>
                <p id="hashText"></p>
            </div>

            <p id="message" class="message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
